<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>75 Soft Tracker</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      :root {
        --color-background-primary: #ffffff;
        --color-background-secondary: #f5f5f4;
        --color-background-tertiary: #f0efed;
        --color-text-primary: #1a1a1a;
        --color-text-secondary: #6b6b6b;
        --color-text-tertiary: #a0a0a0;
        --color-border-tertiary: rgba(0,0,0,0.1);
        --color-border-secondary: rgba(0,0,0,0.2);
        --color-border-primary: rgba(0,0,0,0.35);
        --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        --border-radius-md: 8px;
        --border-radius-lg: 12px;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --color-background-primary: #1c1c1e;
          --color-background-secondary: #2c2c2e;
          --color-background-tertiary: #3a3a3c;
          --color-text-primary: #f5f5f5;
          --color-text-secondary: #ababab;
          --color-text-tertiary: #6b6b6b;
          --color-border-tertiary: rgba(255,255,255,0.1);
          --color-border-secondary: rgba(255,255,255,0.2);
          --color-border-primary: rgba(255,255,255,0.35);
        }
      }
      body {
        font-family: var(--font-sans);
        background: var(--color-background-tertiary);
        color: var(--color-text-primary);
        min-height: 100vh;
        padding: 1rem;
      }
      #root {
        max-width: 680px;
        margin: 0 auto;
        background: var(--color-background-tertiary);
        padding: 1rem 0;
      }
      button { font-family: inherit; }
      input, select { font-family: inherit; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
